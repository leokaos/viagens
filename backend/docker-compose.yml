services:

  venv:
    image: python:3.13-slim
    container_name: venv
    command: bash
    stdin_open: true
    tty: true
    ports:
    - "8000:8000"
    volumes:
      - D:\Projetos\python:/workspace
    working_dir: /workspace
    networks:
      - app-network

  postgres:
    image: postgres:latest
    container_name: postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: